<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560">
  <defs>
    <!-- 3D shadow -->
    <filter id="relief" x="-6%" y="-6%" width="118%" height="120%">
      <feDropShadow dx="4" dy="6" stdDeviation="6" flood-color="#000769" flood-opacity="0.35"/>
    </filter>
    <!-- Subtle highlight on land for 3D feel -->
    <linearGradient id="landFill" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="50%"  stop-color="#f4f7ff"/>
      <stop offset="100%" stop-color="#e8eeff"/>
    </linearGradient>
    <!-- Top-edge highlight for raised effect -->
    <filter id="innerLight" x="0" y="0" width="100%" height="100%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="-2" dy="-2" result="offset"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.6" result="white"/>
      <feComposite in="white" in2="offset" operator="in" result="highlight"/>
      <feMerge><feMergeNode in="SourceGraphic"/><feMergeNode in="highlight"/></feMerge>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="900" height="560" fill="#ffffff"/>

