<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 1 1 0 0  1 1 1 0 0  2 2 2 0 0  0 0 0 .6 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#000769"/>

  <!-- Red circle border -->
  <circle cx="100" cy="100" r="87" fill="none" stroke="#B22234" stroke-width="6"/>

  <!-- Speed lines left of N -->
  <g opacity="0.85" stroke="white" stroke-linecap="round">
    <line x1="28" y1="72" x2="44" y2="72" stroke-width="1.2" opacity="0.9"/>
    <line x1="24" y1="75" x2="42" y2="75" stroke-width="1.0" opacity="0.75"/>
    <line x1="26" y1="78" x2="43" y2="78" stroke-width="0.9" opacity="0.65"/>
    <line x1="30" y1="81" x2="44" y2="81" stroke-width="0.8" opacity="0.55"/>
    <line x1="22" y1="68" x2="40" y2="68" stroke-width="1.1" opacity="0.8"/>
    <line x1="25" y1="65" x2="38" y2="65" stroke-width="0.9" opacity="0.6"/>
    <line x1="28" y1="62" x2="37" y2="62" stroke-width="0.7" opacity="0.45"/>
    <line x1="31" y1="84" x2="44" y2="84" stroke-width="0.7" opacity="0.4"/>
    <line x1="27" y1="87" x2="41" y2="87" stroke-width="0.6" opacity="0.3"/>
  </g>

  <!-- NEXT -->
  <text
    x="103" y="97"
    font-family="'Arial Black','Impact','Franklin Gothic Heavy',sans-serif"
    font-size="52"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1"
    filter="url(#softglow)"
  >NEXT</text>

  <!-- MOOV -->
  <text
    x="103" y="146"
    font-family="'Arial Black','Impact','Franklin Gothic Heavy',sans-serif"
    font-size="52"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1"
    filter="url(#softglow)"
  >MOOV</text>

  <!-- Red orbital arc -->
  <path
    d="M 52 148 Q 100 170 152 142"
    fill="none" stroke="#B22234" stroke-width="2.8" stroke-linecap="round"
  />

  <!-- Stars near arc -->
  <g fill="#B22234">
    <polygon points="148,133 149.5,137 153.5,137 150.3,139.5 151.5,143.5 148,141 144.5,143.5 145.7,139.5 142.5,137 146.5,137" transform="scale(0.55) translate(115,97)"/>
    <circle cx="155" cy="137" r="1.8" fill="#cc3333"/>
    <circle cx="158" cy="133" r="1.2" fill="#cc3333"/>
    <circle cx="152" cy="131" r="1" fill="#cc3333"/>
  </g>
</svg>
